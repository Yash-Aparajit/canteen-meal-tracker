<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:system-ui;
background:#eef2f7;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

h2{
text-align:center;
margin-bottom:10px;
}

input, select, button{
width:100%;
padding:16px;
margin-top:14px;
font-size:18px;
border-radius:12px;
border:1px solid #ccc;
}

button{
background:#0b5cff;
color:white;
border:none;
font-weight:600;
}

.loader{
display:none;
text-align:center;
margin-top:10px;
}

.msg{
text-align:center;
margin-top:10px;
font-weight:600;
}

.success{ color:green; }
.error{ color:red; }

</style>
</head>
<body>

<div class="card">

<h2>Breakfast Scan</h2>

<input id="emp" placeholder="Scan / Enter Employee Code">

<div id="loader" class="loader">Fetching...</div>

<input id="name" placeholder="Employee Name" readonly>

<select id="shift">
<option value="">-- Select Shift --</option>
<option>1st Shift</option>
<option>General Shift</option>
<option>2nd Shift</option>
<option>Night Shift</option>
</select>

<button onclick="save()">SAVE</button>

<div id="msg" class="msg"></div>

</div>

<script>

let empField = document.getElementById("emp");
let nameField = document.getElementById("name");

let lastEmpRequested = "";
let empTimer = null;

empField.focus();

/* ===== LIVE FETCH ===== */

empField.addEventListener("input", debouncedFetchEmp);

function debouncedFetchEmp(){
  clearTimeout(empTimer);
  empTimer = setTimeout(fetchEmp, 250);
}

function fetchEmp(){

  const code = empField.value.trim();

  lastEmpRequested = code;

  if(!code){
    nameField.value = "";
    nameField.style.color = "#111";
    return;
  }

  nameField.style.color = "#666";
  nameField.value = "Fetching...";

  google.script.run
  .withSuccessHandler(res=>{

    if(code !== lastEmpRequested) return;

    if(res.status){
      nameField.style.color = "#111";
      nameField.value = res.name;
    }else{
      nameField.style.color = "red";
      nameField.value = "Invalid Employee";
    }

  })
  .withFailureHandler(()=>{

    if(code !== lastEmpRequested) return;

    nameField.style.color = "red";
    nameField.value = "Lookup Error";

  })
  .fetchEmployee(code);
}


/* ===== SAVE ===== */

function save(){

let payload = {
empCode: empField.value.trim(),
empName: nameField.value,
shift: document.getElementById("shift").value
};

google.script.run.withSuccessHandler(res=>{
if(res.status){
successUX();
resetForm();
}else{
failUX();
showMsg(res.msg,false);
}
}).logBreakfast(payload);

}


function successUX(){
navigator.vibrate(120);
beep(800,120);
showMsg("Saved",true);
}

function failUX(){
navigator.vibrate([100,60,100]);
beep(200,250);
}

function beep(freq,duration){
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
osc.frequency.value = freq;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(), duration);
}

function showMsg(msg,ok){
let el = document.getElementById("msg");
el.className = ok ? "msg success" : "msg error";
el.innerText = msg;
}

function resetForm(){
setTimeout(()=>{
empField.value="";
nameField.value="";
document.getElementById("shift").value="";
document.getElementById("msg").innerText="";
empField.focus();
},700);
}

</script>
</body>
</html>
