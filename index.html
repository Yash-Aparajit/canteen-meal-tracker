<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
font-family:system-ui;
background:#eef2f7;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

h2{
text-align:center;
margin-bottom:10px;
}

input, select, button{
width:100%;
padding:16px;
margin-top:14px;
font-size:18px;
border-radius:12px;
border:1px solid #ccc;
}

button{
background:#0b5cff;
color:white;
border:none;
font-weight:600;
}

.loader{
display:none;
text-align:center;
margin-top:10px;
}

.msg{
text-align:center;
margin-top:10px;
font-weight:600;
}

.success{ color:green; }
.error{ color:red; }

</style>
</head>
<body>

<div class="card">

<h2>Breakfast Scan</h2>

<input id="emp" placeholder="Scan / Enter Employee Code">

<div id="loader" class="loader">Fetching...</div>

<input id="name" placeholder="Employee Name" readonly>

<select id="shift">
<option value="">-- Select Shift --</option>
<option>1st Shift</option>
<option>General Shift</option>
<option>2nd Shift</option>
<option>Night Shift</option>
</select>

<button onclick="save()">SAVE</button>

<div id="msg" class="msg"></div>

</div>

<script>

let emp = document.getElementById("emp");

emp.focus();

emp.addEventListener("change", fetchEmp);

function fetchEmp(){

document.getElementById("loader").style.display="block";

google.script.run.withSuccessHandler(res=>{
document.getElementById("loader").style.display="none";

if(res.status){
document.getElementById("name").value = res.name;
}else{
showMsg(res.msg,false);
}

}).fetchEmployee(emp.value.trim());

}


function save(){

let payload = {
empCode: emp.value.trim(),
empName: document.getElementById("name").value,
shift: document.getElementById("shift").value
};

google.script.run.withSuccessHandler(res=>{
if(res.status){
successUX();
resetForm();
}else{
failUX();
showMsg(res.msg,false);
}
}).logBreakfast(payload);

}


function successUX(){
navigator.vibrate(120);
beep(800,120);
showMsg("Saved",true);
}

function failUX(){
navigator.vibrate([100,60,100]);
beep(200,250);
}

function beep(freq,duration){
let ctx = new (window.AudioContext || window.webkitAudioContext)();
let osc = ctx.createOscillator();
osc.frequency.value = freq;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(), duration);
}

function showMsg(msg,ok){
let el = document.getElementById("msg");
el.className = ok ? "msg success" : "msg error";
el.innerText = msg;
}

function resetForm(){
setTimeout(()=>{
emp.value="";
document.getElementById("name").value="";
document.getElementById("shift").value="";
document.getElementById("msg").innerText="";
emp.focus();
},700);
}

</script>

</body>
</html>
