<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  font-family: system-ui;
  background: #eef2f7;
  padding: 20px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

input, select, button {
  width: 100%;
  padding: 16px;
  margin-top: 14px;
  font-size: 18px;
  border-radius: 12px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background: #0b5cff;
  color: white;
  border: none;
  font-weight: 600;
}

.msg {
  text-align: center;
  margin-top: 10px;
  font-weight: 600;
}

.success { color: green; }
.error { color: red; }

</style>
</head>

<body>

<div class="card">

<h2>Breakfast Scan</h2>

<input id="emp" placeholder="Scan / Enter Employee Code">

<input id="name" placeholder="Employee Name" readonly>

<select id="shift">
<option value="">-- Select Shift --</option>
<option>1st Shift</option>
<option>General Shift</option>
<option>2nd Shift</option>
<option>Night Shift</option>
</select>

<button onclick="save()">SAVE</button>

<div id="msg" class="msg"></div>

</div>

<script>

let empField = document.getElementById("emp");
let nameField = document.getElementById("name");

let lastEmpRequested = "";
let empTimer = null;
let isFetching = false;
let isSaving = false;

let saveBtn = document.querySelector("button");

empField.focus();
runShiftSuggestionCycle();

/* ===== LIVE FETCH ===== */

empField.addEventListener("input", function () {
  clearTimeout(empTimer);
  empTimer = setTimeout(fetchEmp, 250);
});

function fetchEmp() {

  const code = empField.value.trim();

  lastEmpRequested = code;

  if (!code) {
    nameField.value = "";
    nameField.style.color = "#111";
    return;
  }

  nameField.style.color = "#666";
  isFetching = true;
  nameField.value = "Fetching...";

  google.script.run
    .withSuccessHandler(function (res) {

      if (code !== lastEmpRequested) return;

      isFetching = false;
      if (res.status) {
        nameField.style.color = "#111";
        nameField.value = res.name;
      } else {
        nameField.style.color = "red";
        nameField.value = "Invalid Employee";
      }

    })
    .withFailureHandler(function () {

      if (code !== lastEmpRequested) return;

      isFetching = false;
      nameField.style.color = "red";
      nameField.value = "Lookup Error";

    })
    .fetchEmployee(code);
}


/* ===== SAVE ===== */

function save() {

  if (isSaving) return;
  isSaving = true;

  saveBtn.disabled = true;
  saveBtn.style.opacity = "0.6";
  saveBtn.style.cursor = "not-allowed";

  if (isFetching) {
    showMsg("Wait for validation", false);
    isSaving = false;
    saveBtn.disabled = false;
    saveBtn.style.opacity = "1";
    saveBtn.style.cursor = "pointer";
    return;
  }

  if (nameField.value === "Invalid Employee") {
    showMsg("Invalid Employee", false);
    isSaving = false;
    saveBtn.disabled = false;
    saveBtn.style.opacity = "1";
    saveBtn.style.cursor = "pointer";
    return;
  }

  const shift = document.getElementById("shift").value;

  if (!shift) {
    showMsg("Select shift", false);
    isSaving = false;
    saveBtn.disabled = false;
    saveBtn.style.opacity = "1";
    saveBtn.style.cursor = "pointer";
    return;
  }

  if (!nameField.value) {
    showMsg("Scan employee first", false);
    isSaving = false;
    saveBtn.disabled = false;
    saveBtn.style.opacity = "1";
    saveBtn.style.cursor = "pointer";
    return;
  }

  let payload = {
    empCode: empField.value.trim(),
    empName: nameField.value,
    shift: shift
  };

  google.script.run.withSuccessHandler(function (res) {

    if (res.status) {
      successUX();
      setTimeout(() => {
        resetForm();
        isSaving = false;
        saveBtn.disabled = false;
        saveBtn.style.opacity = "1";
        saveBtn.style.cursor = "pointer";
      }, 600);
    } else {
      failUX();
      showMsg(res.msg, false);
      isSaving = false;
      saveBtn.disabled = false;
      saveBtn.style.opacity = "1";
      saveBtn.style.cursor = "pointer";
    }
  }).logBreakfast(payload);
}


/* ===== UX ===== */

function successUX() {
  navigator.vibrate(120);
  beep(800, 120);
  showMsg("Saved", true);
}

function failUX() {
  navigator.vibrate([100, 60, 100]);
  beep(200, 250);
}

function beep(freq, duration) {
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), duration);
}

function showMsg(msg, ok) {
  let el = document.getElementById("msg");
  el.className = ok ? "msg success" : "msg error";
  el.innerText = msg;
}

function resetForm() {

  lastEmpRequested = "";
  isFetching = false;

  clearTimeout(empTimer);

  empField.value = "";
  nameField.value = "";
  document.getElementById("msg").innerText = "";

  suggestShift();

  setTimeout(() => {
    empField.focus();
  }, 50);

}

function suggestShift(){

  const now = new Date();
  const minutes = now.getHours() * 60 + now.getMinutes();

  let shift = "";

  if(minutes >= 360 && minutes <= 405){
    shift = "1st Shift";
  }
  else if(minutes >= 540 && minutes <= 585){
    shift = "General Shift";
  }
  else if(minutes >= 900 && minutes <= 945){
    shift = "2nd Shift";
  }

  const el = document.getElementById("shift");

  if(shift){
    el.value = shift;
  }else if(el.value !== "Night Shift"){
    el.value = "";
  }
}

function runShiftSuggestionCycle(){

  suggestShift();

  if(!window.shiftTimer){
    window.shiftTimer = setInterval(suggestShift, 60000);
  }

  document.addEventListener("visibilitychange", function(){
    if(!document.hidden){
      suggestShift();
      empField.focus();
    }
  });

  /* ===== AUTO RELOAD WATCHDOG ===== */
  if(!window.reloadTimer){
    window.reloadTimer = setTimeout(function(){
      location.reload();
    }, 6 * 60 * 60 * 1000); // 6 hours
  }

}

</script>

</body>
</html>
